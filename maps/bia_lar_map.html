<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BIA AIAN National LAR Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
  <style>
    html, body { height: 100%; margin: 0; }
    #map { height: 100%; width: 100%; }
    .legend {
      background: white;
      padding: 8px 10px;
      border-radius: 6px;
      box-shadow: 0 1px 5px rgba(0,0,0,0.35);
      line-height: 1.3;
      font: 12px/1.3 system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
    }
  </style>
</head>
<body>
  <div style="position: absolute; top: 10px; left: 50px; z-index: 1000; background: white; padding: 8px 10px; border-radius: 6px; box-shadow: 0 1px 5px rgba(0,0,0,0.35); font: 12px system-ui;">
    <label><b>Load GeoJSON:</b></label>
    <input id="geojsonFile" type="file" accept=".geojson,.json" />
  </div>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script>
    const map = L.map('map');

    const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 20,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    const satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
      maxZoom: 20,
      attribution: 'Tiles &copy; Esri'
    });

    const overlays = {};
    L.control.layers({"OSM": osm, "Satellite": satellite}, overlays, {collapsed: false}).addTo(map);

    const legend = L.control({ position: 'bottomright' });
    legend.onAdd = function () {
      const div = L.DomUtil.create('div', 'legend');
      div.innerHTML = '<b>BIA AIAN National LAR</b><br/>Fill: #2563eb<br/>Outline: #1e3a8a';
      return div;
    };
    legend.addTo(map);

    function popupHtml(props = {}) {
      const keys = [
        'LARID','LARNAME','REGION','AGENCY','GISACRES','OBJECTID'
      ];
      const rows = keys
        .filter(k => props[k] !== undefined)
        .map(k => `<tr><td style="padding:2px 8px 2px 0;"><b>${k}</b></td><td>${props[k]}</td></tr>`)
        .join('');
      return `<table>${rows}</table>`;
    }

    let currentLayer = null;

    function renderGeoJSON(geojson) {
      if (currentLayer) {
        map.removeLayer(currentLayer);
      }

      currentLayer = L.geoJSON(geojson, {
        style: {
          color: '#1e3a8a',
          weight: 2,
          fillColor: '#2563eb',
          fillOpacity: 0.22
        },
        onEachFeature: (feature, lyr) => {
          lyr.bindPopup(popupHtml(feature.properties));
        }
      }).addTo(map);

      overlays['LAR Boundaries'] = currentLayer;

      const bounds = currentLayer.getBounds();
      if (bounds.isValid()) {
        map.fitBounds(bounds.pad(0.08));
      } else {
        map.setView([46.3, -84.3], 8);
      }
    }

    document.getElementById('geojsonFile').addEventListener('change', (event) => {
      const file = event.target.files?.[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const geojson = JSON.parse(String(reader.result));
          renderGeoJSON(geojson);
        } catch (e) {
          alert('Invalid GeoJSON file.');
        }
      };
      reader.readAsText(file);
    });

    fetch('../data/BIA_AIAN_National_LAR.geojson')
      .then(r => {
        if (!r.ok) throw new Error('Failed to load GeoJSON');
        return r.json();
      })
      .then(geojson => {
        renderGeoJSON(geojson);
      })
      .catch(err => {
        console.error(err);
        alert('Auto-load failed. Use the file picker to load BIA_AIAN_National_LAR.geojson manually.');
        map.setView([46.3, -84.3], 8);
      });
  </script>
</body>
</html>
